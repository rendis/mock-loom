<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="900" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="line-grad" x1="0" y1="0" x2="900" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0"/>
      <stop offset="15%" stop-color="#6366f1"/>
      <stop offset="85%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="200" rx="12" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04" stroke="#94a3b8" stroke-width="0.5">
    <line x1="0" y1="40" x2="900" y2="40"/>
    <line x1="0" y1="80" x2="900" y2="80"/>
    <line x1="0" y1="120" x2="900" y2="120"/>
    <line x1="0" y1="160" x2="900" y2="160"/>
    <line x1="100" y1="0" x2="100" y2="200"/>
    <line x1="200" y1="0" x2="200" y2="200"/>
    <line x1="300" y1="0" x2="300" y2="200"/>
    <line x1="400" y1="0" x2="400" y2="200"/>
    <line x1="500" y1="0" x2="500" y2="200"/>
    <line x1="600" y1="0" x2="600" y2="200"/>
    <line x1="700" y1="0" x2="700" y2="200"/>
    <line x1="800" y1="0" x2="800" y2="200"/>
  </g>

  <!-- Decorative nodes (left) -->
  <g opacity="0.15">
    <circle cx="80" cy="60" r="4" fill="#6366f1"/>
    <circle cx="120" cy="90" r="3" fill="#8b5cf6"/>
    <circle cx="60" cy="130" r="5" fill="#6366f1"/>
    <circle cx="140" cy="140" r="3" fill="#a78bfa"/>
    <line x1="80" y1="60" x2="120" y2="90" stroke="#6366f1" stroke-width="0.8"/>
    <line x1="120" y1="90" x2="60" y2="130" stroke="#8b5cf6" stroke-width="0.8"/>
    <line x1="60" y1="130" x2="140" y2="140" stroke="#6366f1" stroke-width="0.8"/>
  </g>

  <!-- Decorative nodes (right) -->
  <g opacity="0.15">
    <circle cx="760" cy="50" r="3" fill="#8b5cf6"/>
    <circle cx="800" cy="80" r="5" fill="#6366f1"/>
    <circle cx="840" cy="120" r="4" fill="#a78bfa"/>
    <circle cx="780" cy="150" r="3" fill="#6366f1"/>
    <line x1="760" y1="50" x2="800" y2="80" stroke="#8b5cf6" stroke-width="0.8"/>
    <line x1="800" y1="80" x2="840" y2="120" stroke="#6366f1" stroke-width="0.8"/>
    <line x1="840" y1="120" x2="780" y2="150" stroke="#a78bfa" stroke-width="0.8"/>
  </g>

  <!-- Loom icon -->
  <g transform="translate(310, 55)">
    <rect x="0" y="0" width="36" height="36" rx="8" fill="url(#accent)" opacity="0.9"/>
    <path d="M10 12 L18 8 L26 12 L26 24 L18 28 L10 24 Z" stroke="#fff" stroke-width="1.5" fill="none" stroke-linejoin="round"/>
    <line x1="18" y1="8" x2="18" y2="28" stroke="#fff" stroke-width="1" opacity="0.5"/>
    <line x1="10" y1="12" x2="26" y2="24" stroke="#fff" stroke-width="1" opacity="0.5"/>
    <line x1="26" y1="12" x2="10" y2="24" stroke="#fff" stroke-width="1" opacity="0.5"/>
  </g>

  <!-- Title -->
  <text x="360" y="85" font-family="ui-monospace, SFMono-Regular, 'SF Mono', Menlo, monospace" font-size="38" font-weight="700" fill="#f8fafc" letter-spacing="-0.5">mock-loom</text>

  <!-- Accent line -->
  <rect x="200" y="105" width="500" height="1.5" rx="1" fill="url(#line-grad)"/>

  <!-- Tagline -->
  <text x="450" y="132" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="16" fill="#94a3b8" text-anchor="middle" letter-spacing="0.3">Rule-Based API Mocking Engine</text>

  <!-- Subtitle pills -->
  <g transform="translate(450, 148)" text-anchor="middle">
    <g transform="translate(-145, 0)">
      <rect x="-42" y="-11" width="84" height="22" rx="11" fill="#6366f1" opacity="0.15"/>
      <text x="0" y="4" font-family="ui-monospace, SFMono-Regular, monospace" font-size="11" fill="#a5b4fc" text-anchor="middle">Stateful</text>
    </g>
    <g transform="translate(-35, 0)">
      <rect x="-52" y="-11" width="104" height="22" rx="11" fill="#8b5cf6" opacity="0.15"/>
      <text x="0" y="4" font-family="ui-monospace, SFMono-Regular, monospace" font-size="11" fill="#c4b5fd" text-anchor="middle">expr-lang</text>
    </g>
    <g transform="translate(85, 0)">
      <rect x="-47" y="-11" width="94" height="22" rx="11" fill="#6366f1" opacity="0.15"/>
      <text x="0" y="4" font-family="ui-monospace, SFMono-Regular, monospace" font-size="11" fill="#a5b4fc" text-anchor="middle">Rollback</text>
    </g>
    <g transform="translate(190, 0)">
      <rect x="-30" y="-11" width="60" height="22" rx="11" fill="#8b5cf6" opacity="0.15"/>
      <text x="0" y="4" font-family="ui-monospace, SFMono-Regular, monospace" font-size="11" fill="#c4b5fd" text-anchor="middle">MCP</text>
    </g>
  </g>
</svg>
